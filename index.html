<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Planning Poseurs</title>

  <!-- PWA Manifest (inline base64) -->
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUGxhbm5pbmcgUG9zZXVycyIsInNob3J0X25hbWUiOiJQbGFubmluZyIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMWExYTJlIiwidGhlbWVfY29sb3IiOiIjMWExYTJlIn0=">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- App CSS -->
  <link rel="stylesheet" href="app.css">
</head>
<body>

<!-- ============================================================
     SPLASH
     ============================================================ -->
<div id="splash">
  <div class="splash-icon" id="splashIcon"></div>
  <div class="splash-title" id="splashTitle"></div>
  <div class="spinner"></div>
</div>

<div class="app">

  <!-- ==========================================================
       LOGIN
       ========================================================== -->
  <div id="loginPage">
    <div class="login-icon" id="loginIcon"></div>
    <div class="login-brand" id="loginBrand"></div>
    <form class="login-form" id="loginForm">
      <div class="field"><i class="ph ph-envelope-simple fi"></i><input type="email" id="inEmail" placeholder="Adresse email" autocomplete="email"></div>
      <div class="field"><i class="ph ph-lock-simple fi"></i><input type="password" id="inPass" placeholder="Mot de passe" autocomplete="current-password"></div>
      <div class="login-err" id="loginErr"></div>
      <button type="submit" class="btn btn-accent"><i class="ph ph-sign-in"></i> Se connecter</button>
    </form>
    <div class="login-quick">
      <div class="login-quick-label">Accès rapide démo</div>
      <div class="login-quick-row">
        <button class="btn" onclick="App.quickLogin('magasin')"><i class="ph ph-storefront"></i> Magasin</button>
        <button class="btn" onclick="App.quickLogin('poseur')"><i class="ph ph-hard-hat"></i> Poseur</button>
      </div>
    </div>
    <a class="login-forgot" onclick="alert('Contactez votre responsable.')">Mot de passe oublié ?</a>
    <div class="login-ver" id="loginVer"></div>
  </div>

  <!-- ==========================================================
       SHELL
       ========================================================== -->
  <div id="shell">
    <div class="hdr">
      <div class="hdr-row">
        <div>
          <div class="hdr-greet" id="hdrGreet"></div>
          <div class="hdr-name" id="hdrName"></div>
          <span class="hdr-role" id="hdrRole"></span>
        </div>
        <div class="hdr-avatar" id="hdrAvatar"></div>
      </div>
    </div>

    <!-- Pages (rendered dynamically) -->
    <div class="page" id="pgDashboard"></div>
    <div class="page" id="pgActivities"></div>
    <div class="page" id="pgDossiers"></div>
    <div class="page" id="pgDossierDetail"></div>
    <div class="page" id="pgRapport"></div>
    <div class="page" id="pgPdf"></div>
    <div class="page" id="pgProfile"></div>

    <!-- FAB -->
    <button class="fab" id="fab" onclick="App.openNewActivity()"><i class="ph ph-plus"></i></button>

    <!-- Bottom Nav -->
    <nav class="bnav" id="bnav">
      <button class="bnav-item mag-only" data-pg="dashboard" onclick="App.nav('dashboard')"><i class="ph ph-chart-bar"></i><span>Board</span></button>
      <button class="bnav-item on" data-pg="activities" onclick="App.nav('activities')"><i class="ph ph-clipboard-text"></i><span>Activités</span><span class="bnav-badge" id="navBadge"></span></button>
      <button class="bnav-item" data-pg="dossiers" onclick="App.nav('dossiers')"><i class="ph ph-folder-open"></i><span>Dossiers</span></button>
      <button class="bnav-item" data-pg="rapport" onclick="App.nav('rapport')"><i class="ph ph-note-pencil"></i><span>Rapport</span></button>
      <button class="bnav-item" data-pg="pdf" onclick="App.nav('pdf')"><i class="ph ph-file-pdf"></i><span>PDF</span></button>
      <button class="bnav-item" data-pg="profile" onclick="App.nav('profile')"><i class="ph ph-user-circle"></i><span>Profil</span></button>
    </nav>
  </div>
</div>

<!-- Overlays -->
<div class="overlay" id="ovModal" onclick="App.closeOv('ovModal',event)"><div class="modal" id="modContent" onclick="event.stopPropagation()"></div></div>
<div class="overlay" id="ovConfirm" onclick="App.closeOv('ovConfirm',event)"><div class="modal" id="modConfirm" onclick="event.stopPropagation()"></div></div>
<div class="lightbox" id="lightbox" onclick="App.closeLB()"><img id="lbImg"><button class="lightbox-close" onclick="App.closeLB()"><i class="ph ph-x"></i></button></div>
<div class="toast-wrap" id="toastWrap"></div>

<!-- Scripts (order matters) -->
<script src="config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
